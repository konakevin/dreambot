name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps

      - name: Sync recipe engine deploy copy
        run: |
          node scripts/sync-deno-engine.js
          git diff --exit-code supabase/functions/_shared/recipeEngine.ts || (echo "❌ recipeEngine deploy copy is out of sync. Run: node scripts/sync-deno-engine.js" && exit 1)

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint

      - name: Prettier
        run: npx prettier --check "**/*.{ts,tsx}" --ignore-path .gitignore

      - name: Tests
        run: npx jest --ci
