name: Content Bot Dream Generation

on:
  schedule:
    # 2x daily for HumanBot + GlowBot content bots
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      bot:
        description: 'Specific bot (humanbot or glowbot)'
        required: false
      count:
        description: 'Number of dreams per bot'
        required: false
        default: '1'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Random delay (0-4 hours, cron only)
        if: github.event_name == 'schedule'
        run: sleep $((RANDOM % 14400))

      - name: Generate content bot dreams
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ inputs.bot }}" ]; then
            if [ "${{ inputs.bot }}" = "humanbot" ]; then
              node scripts/generate-humanbot.js --count ${{ inputs.count || '1' }}
            elif [ "${{ inputs.bot }}" = "glowbot" ]; then
              node scripts/generate-glowbot.js --count ${{ inputs.count || '1' }}
            fi
          else
            echo "🤖 Generating for HumanBot..."
            node scripts/generate-humanbot.js --count 1
            sleep 10
            echo "✨ Generating for GlowBot..."
            node scripts/generate-glowbot.js --count 1
          fi
