name: Bot Dream Generation

on:
  schedule:
    # Each seeded bot posts once per day at a random time
    # Solaris posts between 6am-10am UTC
    - cron: '0 6 * * *'
    # Yūki posts between 2pm-6pm UTC
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      bot:
        description: 'Specific bot username (leave empty for all seeded)'
        required: false
      count:
        description: 'Number of dreams per bot'
        required: false
        default: '1'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Random delay (0-4 hours)
        run: sleep $((RANDOM % 14400))

      - name: Generate bot dreams
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ inputs.bot }}" ]; then
            if [ "${{ inputs.bot }}" = "humanbot" ]; then
              node scripts/generate-humanbot.js --count ${{ inputs.count || '1' }}
            elif [ "${{ inputs.bot }}" = "musebot" ]; then
              node scripts/generate-musebot.js --count ${{ inputs.count || '1' }}
            else
              node scripts/generate-bot-dreams.js --bot "${{ inputs.bot }}" --count ${{ inputs.count || '1' }}
            fi
          else
            # Post once for each seeded image bot
            # Migrated to new engine (see .github/workflows/<botname>.yml):
            #   venusbot, sirenbot, bloombot, glowbot, earthbot, animalbot, cuddlebot, coquettebot, mangabot, dragonbot, gothbot
            BOTS=("starbot" "glambot" "steambot" "tinybot" "inkbot" "titanbot" "arcadebot" "toybot")
            for BOT in "${BOTS[@]}"; do
              echo "🎨 Generating for $BOT..."
              node scripts/generate-bot-dreams.js --bot "$BOT" --count 1
              sleep 10
            done
            # HumanBot — content bot with Sharp terminal-card overlay
            echo "🤖 Generating for humanbot..."
            node scripts/generate-humanbot.js --count 1
            sleep 10
            # MuseBot — content bot with Sharp quote-card overlay
            echo "💭 Generating for musebot..."
            node scripts/generate-musebot.js --count 1
          fi
