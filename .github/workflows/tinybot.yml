name: TinyBot Dream Generation

on:
  schedule:
    - cron: '15 10 * * *'
    - cron: '15 22 * * *'
  workflow_dispatch:
    inputs:
      path:
        description: 'Specific path (default: random)'
        required: false
        default: 'random'
      vibe:
        description: 'Specific vibe (default: random)'
        required: false
        default: 'random'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate TinyBot dream
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/run-bot.js \
            --bot tinybot \
            --path "${{ inputs.path || 'random' }}" \
            --vibe "${{ inputs.vibe || 'random' }}"
